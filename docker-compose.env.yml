services:
  butlarr:
    container_name: butlarr
    build:
      context: .
      dockerfile: Dockerfile
    image: butlarr:latest
    volumes:
      # Persistent session storage
      - ./data:/app/data
    environment:
      - BUTLARR_USE_ENV_CONFIG=true
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Whitelist — add as many as needed
      - BUTLARR_WHITELIST_0=${BUTLARR_WHITELIST_0}
      # - BUTLARR_WHITELIST_1=${BUTLARR_WHITELIST_1}
      # APIs
      - BUTLARR_APIS_MOVIE_HOST=${BUTLARR_APIS_MOVIE_HOST}
      - BUTLARR_APIS_MOVIE_API_KEY=${BUTLARR_APIS_MOVIE_API_KEY}
      - BUTLARR_APIS_SERIES_HOST=${BUTLARR_APIS_SERIES_HOST}
      - BUTLARR_APIS_SERIES_API_KEY=${BUTLARR_APIS_SERIES_API_KEY}
      # Services
      - BUTLARR_SERVICES_0_TYPE=Radarr
      - BUTLARR_SERVICES_0_API=movie
      - BUTLARR_SERVICES_0_COMMAND_0=movie
      - BUTLARR_SERVICES_0_COMMAND_1=m
      - BUTLARR_SERVICES_1_TYPE=Sonarr
      - BUTLARR_SERVICES_1_API=series
      - BUTLARR_SERVICES_1_COMMAND_0=series
      - BUTLARR_SERVICES_1_COMMAND_1=s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import butlarr"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
