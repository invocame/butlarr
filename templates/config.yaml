telegram:
  token: "<YOUR_TELEGRAM_TOKEN>"

# Whitelist of Telegram IDs allowed to use the bot.
# User IDs are positive integers; group/supergroup chat IDs are negative.
# To find your ID, message @userinfobot on Telegram.
whitelist:
  - 123456789        # user example
  - -100987654321    # group/supergroup example

apis:
  movie:
    api_host: "<HOST_API_0>"
    api_key: "<API_KEY_0>"
  series:
    api_host: "<HOST_API_1>"
    api_key: "<API_KEY_1>"

services:
  - type: "Radarr"
    commands: ["movie", "m"]
    api: "movie"
  - type: "Sonarr"
    commands: ["series", "s"]
    api: "series"
